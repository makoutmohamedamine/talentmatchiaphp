# Exemple Nginx pour l'API PHP (deploiement seul du backend).
# Adapter VOTRE_DOMAINE et le socket PHP-FPM.

server {
    listen 80;
    server_name VOTRE_DOMAINE;

    client_max_body_size 25M;

    root /var/www/talentmatchiaphp/backend_php/public;
    index index.php;

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_read_timeout 120s;
    }

    location /media/ {
        alias /var/www/talentmatchiaphp/backend_php/media/;
    }
}
