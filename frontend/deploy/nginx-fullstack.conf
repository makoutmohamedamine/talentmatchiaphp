# Voir deploy/nginx-fullstack.conf a la racine du depot.

server {
    listen 80;
    server_name VOTRE_DOMAINE;

    client_max_body_size 25M;

    root /var/www/talentmatchiaphp/frontend/build;
    index index.html;

    location /api/ {
        root /var/www/talentmatchiaphp/backend_php/public;
        try_files /index.php =404;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/talentmatchiaphp/backend_php/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/talentmatchiaphp/backend_php/public;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param REQUEST_METHOD $request_method;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_read_timeout 120s;
    }

    location /media/ {
        alias /var/www/talentmatchiaphp/backend_php/media/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
